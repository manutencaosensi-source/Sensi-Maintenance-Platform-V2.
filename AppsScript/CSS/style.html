<style>

/****************************************************
 SENSI MAINTENANCE PLATFORM V2
 ESTILO PRINCIPAL
****************************************************/


*{
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}


body{

    margin:0;
    background:#f4f6f8;
    color:#333;

}


/* LAYOUT */

.layout{

    display:flex;
    min-height:100vh;

}


/* MENU LATERAL */

.sidebar{

    width:260px;
    background:#111827;
    color:white;
    padding:20px;

}


.logo h2{

    margin:0;
    font-size:28px;

}


.logo span{

    color:#9ca3af;
    font-size:13px;

}


.sidebar nav{

    margin-top:40px;

}


.menu{

    width:100%;
    padding:14px;
    margin-bottom:10px;

    background:transparent;
    border:none;

    color:white;
    text-align:left;

    cursor:pointer;

    border-radius:8px;

    font-size:15px;

}


.menu:hover,
.menu.active{

    background:#2563eb;

}



/* CONTEÚDO */

.content{

    flex:1;
    padding:25px;

}



/* TOPO */

.topbar{

    display:flex;
    justify-content:space-between;
    align-items:center;

    background:white;

    padding:20px;

    border-radius:12px;

    box-shadow:0 2px 8px #0001;

}



.user{

    font-weight:bold;

}



/* CARTÕES */

.cards{

    display:grid;

    grid-template-columns:
    repeat(4,1fr);

    gap:20px;

    margin-top:25px;

}


.card{

    background:white;

    padding:20px;

    border-radius:12px;

    box-shadow:0 2px 8px #0001;

}


.card h3{

    margin:0;

    color:#6b7280;

}


.card h1{

    font-size:36px;

    margin-top:15px;

}



/* PAINÉIS */

.panel{

    background:white;

    margin-top:25px;

    padding:20px;

    border-radius:12px;

    box-shadow:0 2px 8px #0001;

}


.panel-header{

    margin-bottom:15px;

}



/* TABELAS */

table{

    width:100%;

    border-collapse:collapse;

}


th{

    background:#f3f4f6;

    text-align:left;

    padding:12px;

}


td{

    padding:12px;

    border-bottom:1px solid #eee;

}



/* PÁGINAS */

.pagina{

    background:white;

    padding:25px;

    border-radius:12px;

}


.pagina-header{

    display:flex;

    justify-content:space-between;

    align-items:center;

}



/* BOTÕES */

button{

    cursor:pointer;

}


.btnPrincipal{

    background:#2563eb;

    color:white;

    border:none;

    padding:12px 18px;

    border-radius:8px;

}


.btnPrincipal:hover{

    background:#1d4ed8;

}



/* RESPONSIVO TABLET */

@media(max-width:900px){


.sidebar{

    width:80px;

}


.sidebar span,
.logo h2{

    display:none;

}


.cards{

    grid-template-columns:
    repeat(2,1fr);

}


}



</style>
